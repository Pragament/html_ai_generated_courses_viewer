<!DOCTYPE html>
<html>
<head>
    <title>Browser LLM Chat</title>
    <style>
        /* Minimal styling - you can expand this */
        #progress-container { display: none; width: 100%; background-color: #f0f0f0; }
        #progress-fill { width: 0%; height: 20px; background-color: #4CAF50; }
    </style>
</head>
<body>
    <h1>Local AI Chat</h1>
    <select id="model-select">
        <option value="SmolLM2-360M-Instruct-q4f32_1-MLC">SmolLM2 360M (Fast)</option>
        <option value="Phi-3.5-mini-instruct-q4f32_1-MLC">Phi-3.5 Mini (Balanced)</option>
    </select>
    <button id="load-model">Load Model</button>
    <div id="progress-container">
        <div id="progress-fill"></div>
        <span id="progress-text">0%</span>
    </div>
    <div id="output" style="border:1px solid black; height:200px; overflow:scroll; margin:10px 0;"></div>
    <form id="chat-form">
        <input id="prompt" type="text" placeholder="Ask something..." disabled>
        <button type="submit" disabled>Send</button>
    </form>

    <script type="module">
        import { CreateMLCEngine } from 'https://esm.run/@mlc-ai/web-llm';

        // --- DOM Elements ---
        const output = document.getElementById('output');
        const form = document.getElementById('chat-form');
        const promptInput = document.getElementById('prompt');
        const submitButton = document.querySelector('button[type="submit"]');
        const modelSelect = document.getElementById('model-select');
        const loadButton = document.getElementById('load-model');
        const progressContainer = document.getElementById('progress-container');
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');

        let engine = null;

        // --- Progress Callback ---
        const updateProgress = (progress) => {
            progressContainer.style.display = 'block';
            const percent = Math.round(progress.progress * 100);
            progressFill.style.width = percent + '%';
            progressText.textContent = percent + '%';
        };

        // --- Load Model ---
        loadButton.addEventListener('click', async () => {
            const modelId = modelSelect.value;
            output.innerHTML = `Loading ${modelId}...`;
            loadButton.disabled = true;
            modelSelect.disabled = true;

            try {
                if (!navigator.gpu) throw new Error('WebGPU not supported.');
                engine = await CreateMLCEngine(modelId, { initProgressCallback: updateProgress });

                output.innerHTML = 'Model ready! You can now chat.';
                promptInput.disabled = false;
                submitButton.disabled = false;
            } catch (error) {
                output.innerHTML = `Error: ${error.message}`;
                loadButton.disabled = false;
                modelSelect.disabled = false;
                progressContainer.style.display = 'none';
            }
        });

        // --- Handle Chat ---
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!engine) return;

            const userMessage = promptInput.value;
            output.innerHTML += `<br><b>You:</b> ${userMessage}`;
            promptInput.value = '';
            output.innerHTML += `<br><b>AI:</b> `;

            try {
                const chunks = await engine.chat.completions.create({
                    messages: [{ role: 'user', content: userMessage }],
                    stream: true,
                });

                let fullReply = '';
                for await (const chunk of chunks) {
                    const content = chunk.choices[0]?.delta.content || '';
                    fullReply += content;
                    output.innerHTML = output.innerHTML.replace(/AI:.*$/, `AI: ${fullReply}`); // Simple update
                }
                output.innerHTML += '<br>';
            } catch (error) {
                output.innerHTML += `<br>Error: ${error.message}`;
            }
        });
    </script>
</body>
</html>
